name: drl-nocturne-collision

entrypoint: >-
  pip install . --no-build-isolation -q &&
  python -m examples.drl_collision_avoidance.train
  drl.vec_env_mode=ray
  drl.ray_address=auto
  drl.num_workers=128
  drl.num_envs_per_worker=2

# Anyscale uploads this directory to every node in the cluster.
working_dir: .

# Exclude heavy local artifacts that are not needed on the cluster.
excludes:
  - "venv/"
  - "build/"
  - "dist/"
  - "*.egg-info/"
  - "dataset/"
  - "logs/"
  - "__pycache__/"
  - "*.pyc"

# containerfile installs system packages (SFML, cmake, build-essential, xvfb)
# and Python deps. The nocturne C++ extension is built at job startup via
# entrypoint because Anyscale containerfile forbids COPY from local directories.
# NOTE: containerfile and image_uri are mutually exclusive — use only one.
containerfile: Containerfile

# S3 paths for scenario data — picked up by scenario_utils._default_path_for_split()
# via os.environ.get('PROCESSED_TRAIN_NO_TL', ...).
# Workers sync these to /tmp/nocturne_s3_cache/ at env-creation time via _sync_s3_to_local().
# IAM: the Anyscale cloud IAM role must have s3:GetObject + s3:ListBucket on btp-rl-data-mumbai.
env_vars:
  PROCESSED_TRAIN_NO_TL: "s3://btp-rl-data-mumbai/extracted/formatted_json_v2_no_tl_train/"
  PROCESSED_VALID_NO_TL: "s3://btp-rl-data-mumbai/extracted/formatted_json_v2_no_tl_valid/"

compute_config:
  head_node:
    instance_type: g4dn.xlarge    # 1x T4 GPU — learner (ProcessLearner) + main process
  worker_nodes:
    - instance_type: m5.4xlarge   # 16 vCPU, 64 GB — Ray env actor workers
      min_nodes: 2                 # raised from 1: ensures meaningful parallelism before training starts
      max_nodes: 2
      market_type: PREFER_SPOT    # cheaper; falls back to on-demand if unavailable

max_retries: 1
timeout_s: 86400                  # 24 h hard cap

seed: 42
device: 'cuda:0'
experiment: drl_collision_avoidance

single_agent_mode: False
max_num_vehicles: 1
episode_length: 80
num_files: -1
scenario_split: train
scenario_path: null
dt: 0.1

discretize_actions: False
accel_lower_bound: -3.0
accel_upper_bound: 2.0
steering_lower_bound: -0.7
steering_upper_bound: 0.7
head_angle_lower_bound: 0.0
head_angle_upper_bound: 0.0
head_angle_discretization: 1

remove_at_goal: True
remove_at_collide: True

scenario:
  start_time: 0
  allow_non_vehicles: True
  moving_threshold: 0.2
  speed_threshold: 0.05
  max_visible_objects: 16
  max_visible_road_points: 1000
  max_visible_traffic_lights: 20
  max_visible_stop_signs: 4
  sample_every_n: 1
  road_edge_first: False

rew_cfg:
  shared_reward: False
  goal_tolerance: 2.0
  reward_scaling: 1.0
  collision_penalty: 1000.0
  shaped_goal_distance: False
  shaped_goal_distance_scaling: 0.0
  goal_distance_penalty: False
  goal_achieved_bonus: 100.0
  position_target: True
  position_target_tolerance: 5.0
  speed_target: False
  speed_target_tolerance: 1.0
  heading_target: False
  heading_target_tolerance: 0.3

subscriber:
  view_angle: 2.1
  view_dist: 80
  use_ego_state: True
  use_observations: True
  keep_inactive_agents: False
  n_frames_stacked: 1
  render_img_width: 640
  render_img_height: 480
  render_padding: 30.0

drl:
  lr: 1
  gamma : 10.0
  dueling: true
  epsilon_start: 0.9
  epsilon_end: 0.05
  epsilon_decay_steps: 500000
  replay_buffer_size: 1000000
  batch_size: 128
  target_update_freq: 500
  train_freq: 4
  min_replay_size: 1000
  hidden_layers: [512, 512, 256, 32]
  num_episodes: 1000
  max_episode_steps: 80
  log_interval: 10
  save_interval: 1000
  checkpoint_dir: checkpoints/drl_collision_avoidance
  num_workers: null
  num_envs_per_worker: null
  num_envs: 4          
  vec_env_mode: async   # async | sync | dummy
  train_in_background: true

occupancy_grid:
  rows: 10
  cols: 5
  forward_dist: 10.0
  backward_dist: 5.0
  lateral_dist: 7.0
  vru_weight: 2.0
  vehicle_weight: 1.0
  road_edge_weight: 3.0

reward:
  goal_bonus: 10000.0
  collision_penalty: 1000.0
  step_penalty: 0.0
  progress_scale: 0.9
  ttz_safe_threshold: 0.0
  ttz_reward_scale: 0.5
  offroad_penalty: 500.0
  heading_scale: 0.3

action_map:
  throttle_levels: [-1.0, 0.0, 2.0]
  steer_levels: [-0.7, -0.2, 0.0, 0.2, 0.7]


# Depth-4 CRL variant (baseline shallow network)
# Run: python -m examples.drl_collision_avoidance.train_crl --config-name crl_config_depth4 scenario_path=...
seed: 42
device: 'cuda:0'
experiment: crl_collision_avoidance_depth4
single_agent_mode: True
max_num_vehicles: 1
episode_length: 80
num_files: -1
scenario_split: train
scenario_path: null
dt: 0.1
discretize_actions: False
accel_lower_bound: -3.0
accel_upper_bound: 2.0
steering_lower_bound: -0.7
steering_upper_bound: 0.7
head_angle_lower_bound: 0.0
head_angle_upper_bound: 0.0
head_angle_discretization: 1
remove_at_goal: True
remove_at_collide: True

scenario:
  start_time: 0
  allow_non_vehicles: True
  moving_threshold: 0.2
  speed_threshold: 0.05
  max_visible_objects: 16
  max_visible_road_points: 1000
  max_visible_traffic_lights: 20
  max_visible_stop_signs: 4
  sample_every_n: 1
  road_edge_first: False

# rew_cfg used only for base_env done-condition bookkeeping (not as CRL reward)
rew_cfg:
  shared_reward: False
  goal_tolerance: 2.0
  reward_scaling: 1.0
  collision_penalty: 0.0
  shaped_goal_distance: False
  shaped_goal_distance_scaling: 0.0
  goal_distance_penalty: False
  goal_achieved_bonus: 0.0
  position_target: True
  position_target_tolerance: 5.0
  speed_target: False
  speed_target_tolerance: 1.0
  heading_target: False
  heading_target_tolerance: 0.3

subscriber:
  view_angle: 2.1
  view_dist: 80
  use_ego_state: True
  use_observations: True
  keep_inactive_agents: False
  n_frames_stacked: 1
  render_img_width: 640
  render_img_height: 480
  render_padding: 30.0

occupancy_grid:
  rows: 20
  cols: 10
  forward_dist: 40.0
  backward_dist: 5.0
  lateral_dist: 10.0
  vru_weight: 2.0
  vehicle_weight: 1.0
  road_edge_weight: 3.0

crl:
  critic_depth: 4
  actor_depth: 4
  network_width: 256
  embed_dim: 64
  critic_lr: 3.0e-4
  actor_lr: 3.0e-4
  alpha_lr: 3.0e-4
  batch_size: 512
  gamma: 0.99
  target_entropy_factor: 0.5
  logsumexp_penalty_coeff: 0.1
  gradient_steps_per_episode: 10
  her_max_episodes: 50000
  min_replay_episodes: 200
  total_episodes: 1000000
  num_envs: 8
  max_episode_steps: 80
  log_interval: 100
  save_interval: 10000
  checkpoint_dir: checkpoints/crl_depth4
  resume_checkpoint: null
